{% set name = "azure-mgmt-appconfiguration" %}
{% set version = "6.0.0b1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_')}}-{{ version }}.tar.gz
  sha256: cc1684c9271669d72168a5797e18351265566bfa123eb7bf818de1d6f35ae5de

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<39]

requirements:
  host:
    - setuptools
    - wheel
    - python
    - pip
  run:
    - python
    - isodate >=0.6.1
    - azure-mgmt-core >=1.6.0
    - typing-extensions >=4.6.0
    
test:
  imports:
    - azure.mgmt.appconfiguration
    - azure.mgmt.appconfiguration.aio
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/Azure/azure-sdk-for-python
  summary: Microsoft Azure App Configuration Management Client Library for Python
  license: MIT
  license_file: LICENSE
  license_family: MIT
  description: This is the Microsoft Azure App Configuration Management Client Library.
  dev_url: https://github.com/Azure/azure-sdk-for-python
  doc_url: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - janjagusch
